# Server options
set -as terminal-overrides ",xterm-256color:RGB"

# General options
set -g renumber-windows on

# Set status style
set -g status-fg colour66
set -g status-bg colour236

set -g status-left-length 40
set -g status-right-length 80

set -g status-right "#{?window_bigger,[#{window_offset_x}#,#{window_offset_y}] ,}#{=21:pane_title} %F %r"

# Set key mapping for copy mode
set -g mode-keys vi

# Set prefix to Ctrl-Space instead of Ctrl-b
unbind C-b
set -g prefix C-Space
bind Space send-prefix

# Rebind pane selection
unbind l
bind b last

bind h selectp -L
bind j selectp -U
bind k selectp -D
bind l selectp -R

# Rebind kill window
unbind &
bind X confirm -p "kill-window #W? (y/n)" killw

# Rebind pane creation
unbind -

bind | splitw -v
bind - splitw -h
