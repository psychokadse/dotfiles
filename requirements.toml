# == host ==
#
# A generalization of a host system that allows installing packages.
#
# default_source:
#	The default source used by the host. May be a package manager or a
#	version control system like Git.
#	type: string
#	required: yes
#
# default_repository:
#	The default repository used to acquire packages. Used only by package
#	managers, therefore optional.
#	type: string
#	required: no
#	default: ""
#
# description:
#	A description of the host. Optional.
#	type: string
#	required: no
#	default: ""
#
# name:
#	The name of the host, e.g. the name of the Linux distribution.
#	type: string
#	required: yes
#
# supports_env:
#	Which environments are supported by this host. If a package defines *env*,
#	a tool may not attempt to install a package unless the host also
#	defines all *env*s required by the package here.
#	type: array of string
#	required: no
#	default: []

# == package ==
#
# A host-agnostic specification of a package.
#
# depends:
#	The names of packages that must be installed before this package.
#	If unspecified, the package is assumed to have no such dependencies.
#	type: array of string
#	required: no
#	default: []
#
# description:
#	A description of the package. Optional.
#	type: string
#	required: no
#	default: ""
#
# name:
#	The name of the package. Used to uniquely identify a specific package.
#	type: string
#	required: yes
#
# requires_env:
#	The environment profiles required for a package, if the package is
#	only supported on certain hardware or desktop environment, for
#	instance. If unspecified, the package is assumed to work no matter
#	the environment.
#	type: array of string
#	required: no
#	default: []
#
# sources:
#	An array of *source*s that can provide the package. If unspecified, the *host*s
#	*default source* may attempt to install the package using the *name* provided
#	by the package. Sources are to be tried in the order they are specified until
#	installation succeeds or there are no sources left to try.
#	type: array of inline table (*source*, see below)
#	required: no
#	default: []
#
# virtual:
#	Whether the package is virtual, e.g. refers to a group of packages
#	instead of one specific package.
#	type: boolean
#	required: no
#	default: false

# == source ==
#
# A source that can be used to acquire a package.
#
# destination:
#	The directory the downloaded file is to be placed in. Only used
#	when *uri* is specified.
#	type: string
#	required: no
#	default: "~/Downloads"
#
# name:
#	The name of the package. Used to uniquely identify a specific package.
#	type: string
#	required: yes
#
# repository:
#	The name of the repository that hosts the package. If unspecified, the
#	host's default repository may be used to acquire the package.
#	type: string
#	required: no
#	default: ""
#
# type:
#	What package manager, version control system or protocol to use to
#	acquire the package. Can be one of "pacman", "aur" or "git".
#	type: string
#	required: yes
#
# uri:
#	The download URI of the package. Overrides *name* if specified.
#	If unspecified, the package is assumed to not require a download
#	URI to be acquired.
#	type: string
#	required: no
#	default: ""

# == tag ==
#
# A specification of a tag describing a group of packages by their function,
# scope etc.
#
# description:
#	A description of the tag. Optional.
#	type: string
#	required: no
#	default: ""
#
# name:
#	The name of the tag. Used to uniquely identify the tag.
#	type: string
#	required: yes
#
# packages:
#	A list of all packages included in this tag. A package not marked as
#	required will be excluded from a minimal installation of a group of
#	packages identified by *tag*, unless it is depended on by another package
#	in the group.
#	Note: A package marked as required may still be blocked from installation
#	if the host cannot satisfy its env constraints.
#	type: array of inline table (*tagspec*, see below)
#	required: yes

# == tagspec ==
#
# A specification of a package included in a tag and how it is to be treated.
#
# name:
#	The name of the package as specified by the package's *name* key.
#	type: string
#	required: yes
#
# repository:
#	The name of the repository that hosts the package. If unspecified, the
#	host's default repository may be used to acquire the package.
#	type: string
#	required: no
#	default: ""
#
# required:
#	Whether the package is required for a minimal installation of *tag*.
#	If false, package may be ignored safely unless depended on by another
#	package specified by *tag*.
#	type: boolean
#	required: no
#	default: true
